
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <!-- Normalize -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/acordeon.css">
    <link rel="stylesheet" href="assets/css/lenguages.css">
    <link rel="stylesheet" href="assets/css/portfolio.css">
    <link rel="stylesheet" href="assets/css/experience.css">
    <link rel="stylesheet" href="assets/css/skills.css">
    <link rel="stylesheet" href="assets/css/education.css">

    <title>Portfólio Luiz Alberto Huller</title>
</head>
<body>

<div class="main">

<header class="header">

    <img 
        src="assets/img/Foto Luiz.jpeg"
        id="profile.photo"
        class="photo"
        alt="Foto de Perfil"
        width="200"
    >

    <h1 class="title">
        Olá, eu <span id="profile.name">Carregando...</span>
    </h1>

    <div class="information">

        <p class="trabalho">
            <span id="profile.job">Carregando...</span>
        </p>

        <p class="localizacao">
            <span id="profile.location">Carregando...</span>
        </p>

        <p class="phone">
            <a id="profile.phone.link" href="#">
                <span id="profile.phone">Carregando...</span>
            </a>
        </p>

        <p class="email">
            <a id="profile.email.link" href="#">
                <span id="profile.email">Carregando...</span>
            </a>
        </p>

    </div>

</header>

<!-- SKILLS -->

<section class="acordeon">

    <button class="trigger" type="button">
        Skills
    </button>

    <div class="content">

        <div class="skills">

            <section class="tools">

                <h3 class="title">
                    Habilidades Técnicas
                </h3>

                <ul id="profile.skills.hardskills">

                </ul>

            </section>

            <section class="personal-skills">

                <h3 class="title">
                    Habilidades Pessoais
                </h3>

                <ul id="profile.skills.softskills" >

            

                </ul>

            </section>

        </div>

    </div>

</section>

<!-- IDIOMAS -->

<section class="acordeon">

    <button class="trigger" type="button">
        Idiomas
    </button>

    <div class="content">

        <ul  id="languages" class="languages">

        </ul>

    </div>

</section>

<!-- EDUCAÇÃO -->

<section class="acordeon">

    <button class="trigger" type="button">
        Educação
    </button>

    <div class="content">

        <section class="certificados">

            <h3 class="title">
                Minhas conquistas na Dio
            </h3>

            <ul class="education">

                <li>
                    <img src="assets/img/icons/iconcss.webp" alt="CSS">
                </li>

                <li>
                    <img src="assets/img/icons/iconhtml.webp" alt="HTML">
                </li>

                <li>
                    <img src="assets/img/icons/iconjs.webp" alt="JavaScript">
                </li>

            </ul>

            <div class="formacao">

                <h4 class="title">
                    Dio.me
                </h4>

                <span>
                    Front-end Developer
                </span>

            </div>

            <div class="formacao">

                <h4 class="title">
                    Unisul - Análise e Desenvolvimento de Sistemas
                </h4>

                <span class="period">
                    2022 - 2026
                </span>

            </div>

        </section>

    </div>

</section>

<!-- PORTFÓLIO -->

<section class="acordeon">

    <button class="trigger" type="button">
        Portfólio
    </button>

    <div class="content">

        <ul class="portfolio" id="profile.portfolio"></ul>

    </div>

</section>

<!-- EXPERIÊNCIA -->

<section class="acordeon">

    <button class="trigger" type="button">
        Experiência Profissional
    </button>

    <div class="content">

        <ul class="experience" id="profile.professionalExperience"></ul>

    </div>

</section>

</div>

<!-- JS -->

<script src="assets/js/acordeon.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
